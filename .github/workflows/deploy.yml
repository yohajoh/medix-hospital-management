name: Medix Production Deployment

on:
  push:
    branches: [main] # This triggers the "magic" every time you push to main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 3. Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 4. Build and Push API (Express)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile # Adjust this if your API Dockerfile path is different
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/medix-api:latest

      - name: 5. Build and Push Web (Next.js)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/medix-web:latest
